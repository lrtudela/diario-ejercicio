<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Diary</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    header {
      background: #1a1a1a;
      padding: 16px 20px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1a1a1a;
      display: flex;
      border-top: 1px solid #333;
    }

    nav button {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      color: #888;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s;
    }

    nav button.active { color: #4ade80; }

    .screen { display: none; padding: 24px 20px; }
    .screen.active { display: block; }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #4ade80;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 6px;
      margin-top: 16px;
    }

    input, textarea, select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      color: #f0f0f0;
      font-size: 1rem;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #4ade80;
    }

    button.submit {
      margin-top: 24px;
      width: 100%;
      background: #4ade80;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    button.submit:active { background: #22c55e; }

    .mensaje {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .mensaje.ok { background: #14532d; color: #4ade80; display: block; }
    .mensaje.error { background: #450a0a; color: #f87171; display: block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4ade80">
</head>
<body>

<header>🏋️ Fitness Diary</header>

<!-- PANTALLA: PESO -->
<section class="screen active" id="screen-peso">
  <h2>Registrar peso</h2>

  <label>Fecha</label>
  <input type="date" id="peso-fecha">

  <label>Peso (kg)</label>
  <input type="number" id="peso-valor" step="0.1" placeholder="75.5">

  <label>Notas (opcional)</label>
  <textarea id="peso-notas" rows="2" placeholder="En ayunas, después de entrenar..."></textarea>

  <button class="submit" onclick="enviarPeso()">Guardar</button>
  <div class="mensaje" id="peso-mensaje"></div>
</section>

<!-- PANTALLA: ENTRENAMIENTO -->
<section class="screen" id="screen-entrenamiento">
  <h2>Registrar sesión</h2>

  <label>Fecha</label>
  <input type="date" id="sesion-fecha">

  <label>Tipo de sesión</label>
  <select id="sesion-tipo">
    <option value="fuerza">Fuerza</option>
    <option value="cardio">Cardio</option>
    <option value="movilidad">Movilidad</option>
    <option value="mixto">Mixto</option>
  </select>

  <label>Notas de la sesión (opcional)</label>
  <textarea id="sesion-notas" rows="2" placeholder="Sensaciones, RPE general..."></textarea>

  <hr style="border-color:#333; margin: 24px 0;">

  <h2>Añadir ejercicio</h2>

  <label>Ejercicio</label>
  <input type="text" id="ej-nombre" placeholder="Sentadilla, Press banca...">

  <label>Series</label>
  <input type="number" id="ej-series" placeholder="4">

  <label>Repeticiones</label>
  <input type="number" id="ej-reps" placeholder="8">

  <label>Carga (kg)</label>
  <input type="number" id="ej-carga" step="0.5" placeholder="80">

  <button class="submit" style="background:#1a1a1a; color:#4ade80; border: 1px solid #4ade80; margin-top:16px" onclick="añadirEjercicio()">+ Añadir ejercicio</button>

  <div id="lista-ejercicios" style="margin-top: 20px;"></div>

  <button class="submit" onclick="enviarSesion()">Guardar sesión</button>
  <div class="mensaje" id="sesion-mensaje"></div>
</section>

<!-- PANTALLA: PROGRESO -->
<section class="screen" id="screen-progreso">
  <h2>Evolución del peso</h2>
  <canvas id="grafica-peso" style="width:100%; margin-bottom:32px"></canvas>

  <!-- Pestañas de log -->
  <div style="display:flex; gap:8px; margin-bottom:16px">
    <button id="tab-sesiones" onclick="mostrarTab('sesiones')"
      style="flex:1; padding:10px; border-radius:8px; border:1px solid #4ade80; background:#4ade80; color:#0f0f0f; font-weight:700; cursor:pointer">
      Sesiones
    </button>
    <button id="tab-pesos" onclick="mostrarTab('pesos')"
      style="flex:1; padding:10px; border-radius:8px; border:1px solid #333; background:none; color:#aaa; cursor:pointer">
      Pesos
    </button>
  </div>

  <div id="log-sesiones"></div>
  <div id="log-pesos" style="display:none"></div>
</section>

<!-- NAVEGACIÓN -->
<nav>
  <button class="active" onclick="mostrarPantalla('peso', this)">⚖️ Peso</button>
  <button onclick="mostrarPantalla('entrenamiento', this)">💪 Entrena</button>
  <button onclick="mostrarPantalla('progreso', this)">📈 Progreso</button>
</nav>

<script>
  const API = "https://script.google.com/macros/s/AKfycbz0Z04ZF-cvnLQYmXEisnAHmAlONn9wNplFLw4qtBDasM-nG7eH23vE0uu2dcK31aue/exec";

  let ejercicios = [];

  // Fechas de hoy por defecto
  const hoy = new Date().toISOString().split("T")[0];
  document.getElementById("peso-fecha").value = hoy;
  document.getElementById("sesion-fecha").value = hoy;

  let graficaPeso = null;

  function mostrarPantalla(nombre, boton) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.getElementById("screen-" + nombre).classList.add("active");
    boton.classList.add("active");

    if (nombre === "progreso") cargarProgreso();
  }

  async function cargarProgreso() {
    try {
      const resPeso = await fetch(API + "?accion=peso");
      const dataPeso = await resPeso.json();
      renderizarGraficaPeso(dataPeso.datos);
      renderizarLogPesos(dataPeso.datos);

      const resSesiones = await fetch(API + "?accion=sesiones");
      const dataSesiones = await resSesiones.json();
      renderizarTablaSesiones(dataSesiones.datos);

    } catch (err) {
      console.error("Error cargando progreso:", err);
    }
  }

  function renderizarGraficaPeso(datos) {
    if (!datos || datos.length === 0) {
      document.getElementById("grafica-peso").style.display = "none";
      return;
    }

    // Ordenar por fecha
    datos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

    const labels = datos.map(d => {
      const fecha = new Date(d.fecha);
      return fecha.toLocaleDateString("es-ES", { day: "numeric", month: "short" });
    });
    const pesos = datos.map(d => parseFloat(d.peso));

    // Destruir gráfica anterior si existe
    if (graficaPeso) graficaPeso.destroy();

    const ctx = document.getElementById("grafica-peso").getContext("2d");
    graficaPeso = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Peso (kg)",
          data: pesos,
          borderColor: "#4ade80",
          backgroundColor: "rgba(74, 222, 128, 0.1)",
          borderWidth: 2,
          pointBackgroundColor: "#4ade80",
          pointRadius: 4,
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: "#f0f0f0" } }
        },
        scales: {
          x: { ticks: { color: "#888" }, grid: { color: "#222" } },
          y: {
            ticks: { color: "#888" },
            grid: { color: "#222" },
            suggestedMin: Math.min(...pesos) - 2,
            suggestedMax: Math.max(...pesos) + 2
          }
        }
      }
    });
  }

  function renderizarTablaSesiones(datos) {
    const contenedor = document.getElementById("log-sesiones");

    if (!datos || datos.length === 0) {
      contenedor.innerHTML = "<p style='color:#888'>Sin sesiones registradas</p>";
      return;
    }

    const porFecha = {};
    datos.forEach(fila => {
      const key = fila.fecha + "|" + fila.tipo;
      if (!porFecha[key]) porFecha[key] = { fecha: fila.fecha, tipo: fila.tipo, ejercicios: [] };
      porFecha[key].ejercicios.push(fila);
    });

    const sesiones = Object.values(porFecha)
      .sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

    contenedor.innerHTML = sesiones.map(s => {
      const fecha = new Date(s.fecha).toLocaleDateString("es-ES", {
        weekday: "short", day: "numeric", month: "short", year: "numeric"
      });
      const volumen = s.ejercicios.reduce((acc, ej) =>
        acc + (ej.series * ej.repeticiones * ej.carga), 0
      );
      return `
        <div style="background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:14px; margin-bottom:12px">
          <div style="display:flex; justify-content:space-between; margin-bottom:8px">
            <span style="font-weight:600">${fecha}</span>
            <span style="color:#4ade80; font-size:0.85rem; text-transform:uppercase">${s.tipo}</span>
          </div>
          ${s.ejercicios.map(ej => `
            <div style="color:#aaa; font-size:0.85rem; padding:4px 0; border-top:1px solid #222">
              ${ej.ejercicio} — ${ej.series}×${ej.repeticiones} a ${ej.carga}kg
            </div>
          `).join("")}
          ${volumen > 0 ? `
            <div style="margin-top:8px; padding-top:8px; border-top:1px solid #222; font-size:0.8rem; color:#666">
              Volumen total: ${volumen.toLocaleString("es-ES")} kg
            </div>
          ` : ""}
        </div>
      `;
    }).join("");
  }

  // --- PESO ---

  async function enviarPeso() {
    const fecha = document.getElementById("peso-fecha").value;
    const peso = document.getElementById("peso-valor").value;
    const notas = document.getElementById("peso-notas").value;
    const msg = document.getElementById("peso-mensaje");

    if (!fecha || !peso) {
      mostrarMensaje(msg, "Fecha y peso son obligatorios", "error");
      return;
    }

    const datos = { tipo: "peso", fecha, peso: parseFloat(peso), notas };

    try {
      await fetch(API, {
        method: "POST",
        body: JSON.stringify(datos),
        headers: { "Content-Type": "text/plain" }
      });
      mostrarMensaje(msg, "✓ Peso guardado", "ok");
      document.getElementById("peso-valor").value = "";
      document.getElementById("peso-notas").value = "";
    } catch (err) {
      mostrarMensaje(msg, "Error al conectar con la API", "error");
    }
  }

  // --- ENTRENAMIENTO ---

  function añadirEjercicio() {
    const nombre = document.getElementById("ej-nombre").value.trim();
    const series = document.getElementById("ej-series").value;
    const reps = document.getElementById("ej-reps").value;
    const carga = document.getElementById("ej-carga").value;

    if (!nombre || !series || !reps) {
      alert("Nombre, series y repeticiones son obligatorios");
      return;
    }

    const ej = {
      nombre,
      series: parseInt(series),
      repeticiones: parseInt(reps),
      carga: parseFloat(carga) || 0
    };

    ejercicios.push(ej);
    renderizarEjercicios();

    // Limpiar campos
    document.getElementById("ej-nombre").value = "";
    document.getElementById("ej-series").value = "";
    document.getElementById("ej-reps").value = "";
    document.getElementById("ej-carga").value = "";
    document.getElementById("ej-nombre").focus();
  }

  function eliminarEjercicio(index) {
    ejercicios.splice(index, 1);
    renderizarEjercicios();
  }

  function renderizarEjercicios() {
    const lista = document.getElementById("lista-ejercicios");

    if (ejercicios.length === 0) {
      lista.innerHTML = "";
      return;
    }

    lista.innerHTML = `
      <p style="color:#aaa; font-size:0.85rem; margin-bottom:10px">Ejercicios añadidos:</p>
      ${ejercicios.map((ej, i) => `
        <div style="background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:12px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <div style="font-weight:600">${ej.nombre}</div>
            <div style="color:#888; font-size:0.85rem">${ej.series}×${ej.repeticiones} — ${ej.carga}kg</div>
          </div>
          <button onclick="eliminarEjercicio(${i})" style="background:none; border:none; color:#f87171; font-size:1.2rem; cursor:pointer">✕</button>
        </div>
      `).join("")}
    `;
  }

  async function enviarSesion() {
    const fecha = document.getElementById("sesion-fecha").value;
    const tipo_sesion = document.getElementById("sesion-tipo").value;
    const notas = document.getElementById("sesion-notas").value;
    const msg = document.getElementById("sesion-mensaje");

    if (!fecha) {
      mostrarMensaje(msg, "La fecha es obligatoria", "error");
      return;
    }

    if (ejercicios.length === 0) {
      mostrarMensaje(msg, "Añade al menos un ejercicio", "error");
      return;
    }

    const datos = { tipo: "sesion", fecha, tipo_sesion, notas, ejercicios };

    try {
      await fetch(API, {
        method: "POST",
        body: JSON.stringify(datos),
        headers: { "Content-Type": "text/plain" }
      });
      mostrarMensaje(msg, "✓ Sesión guardada", "ok");
      ejercicios = [];
      renderizarEjercicios();
      document.getElementById("sesion-notas").value = "";
    } catch (err) {
      mostrarMensaje(msg, "Error al conectar con la API", "error");
    }
  }

  // --- UTILS ---

  function mostrarMensaje(el, texto, tipo) {
    el.textContent = texto;
    el.className = "mensaje " + tipo;
    setTimeout(() => el.className = "mensaje", 3000);
  }
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/diario-ejercicio/sw.js");
  }
  function mostrarTab(tab) {
    const esSesiones = tab === "sesiones";

    document.getElementById("log-sesiones").style.display = esSesiones ? "block" : "none";
    document.getElementById("log-pesos").style.display = esSesiones ? "none" : "block";

    document.getElementById("tab-sesiones").style.background = esSesiones ? "#4ade80" : "none";
    document.getElementById("tab-sesiones").style.color = esSesiones ? "#0f0f0f" : "#aaa";
    document.getElementById("tab-sesiones").style.borderColor = esSesiones ? "#4ade80" : "#333";

    document.getElementById("tab-pesos").style.background = esSesiones ? "none" : "#4ade80";
    document.getElementById("tab-pesos").style.color = esSesiones ? "#aaa" : "#0f0f0f";
    document.getElementById("tab-pesos").style.borderColor = esSesiones ? "#333" : "#4ade80";
  }

  function renderizarLogPesos(datos) {
    const contenedor = document.getElementById("log-pesos");

    if (!datos || datos.length === 0) {
      contenedor.innerHTML = "<p style='color:#888'>Sin registros de peso</p>";
      return;
    }

    const ordenados = [...datos].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

    contenedor.innerHTML = ordenados.map(d => {
      const fecha = new Date(d.fecha).toLocaleDateString("es-ES", {
        weekday: "short", day: "numeric", month: "short", year: "numeric"
      });
      return `
        <div style="background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center">
          <div>
            <div style="font-size:0.85rem; color:#888">${fecha}</div>
            ${d.notas ? `<div style="font-size:0.8rem; color:#666; margin-top:4px">${d.notas}</div>` : ""}
          </div>
          <div style="font-size:1.4rem; font-weight:700; color:#4ade80">${parseFloat(d.peso).toFixed(1)} kg</div>
        </div>
      `;
    }).join("");
  }
</script>

</body>
</html>
